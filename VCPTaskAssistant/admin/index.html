<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>任务派发中心</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: #0f172a; color: #f8fafc; padding: 16px; }
        h2 { margin-bottom: 16px; }
        .section { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
        .section h3 { margin-bottom: 12px; font-size: 0.95rem; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; margin-bottom: 4px; font-size: 0.8rem; color: #94a3b8; }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%; padding: 8px 12px; background: #0f172a; border: 1px solid #334155;
            border-radius: 6px; color: #f8fafc; font-size: 0.85rem;
        }
        .form-group textarea { min-height: 60px; font-family: monospace; resize: vertical; }
        .task-list { display: flex; flex-direction: column; gap: 8px; }
        .task-item { display: flex; align-items: center; gap: 12px; padding: 10px; background: #0f172a; border-radius: 6px; }
        .task-status { width: 8px; height: 8px; border-radius: 50%; }
        .task-status.active { background: #4ade80; }
        .task-status.paused { background: #f59e0b; }
        .task-info { flex: 1; }
        .task-name { font-size: 0.9rem; font-weight: 600; }
        .task-schedule { font-size: 0.75rem; color: #94a3b8; }
        .btn { padding: 6px 14px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.8rem; }
        .btn-save { background: #0ea5e9; color: white; }
        .btn-trigger { background: #10b981; color: white; }
        .btn-toggle { background: #f59e0b; color: #1e293b; }
        .loading { text-align: center; padding: 40px; opacity: 0.5; }
        .error { color: #ef4444; text-align: center; padding: 20px; }
        .status { font-size: 0.8rem; color: #4ade80; margin-top: 8px; }
    </style>
</head>
<body>
    <h2>任务派发中心</h2>
    <div id="content"><p class="loading">加载任务配置...</p></div>
    <script>
        const API = '/admin_api';

        async function loadConfig() {
            const content = document.getElementById('content');
            try {
                const res = await fetch(`${API}/task-assistant/config`);
                if (!res.ok) throw new Error('任务接口不可用');
                const config = await res.json();
                renderConfig(config);
            } catch (e) {
                content.innerHTML = `<p class="error">${e.message}<br><small>请确认 VCPTaskAssistant 插件已启用</small></p>`;
            }
        }

        function renderConfig(config) {
            const tasks = config.tasks || [];
            document.getElementById('content').innerHTML = `
                <div class="section">
                    <h3>任务列表</h3>
                    <div class="task-list">
                        ${tasks.length === 0 ? '<p class="loading">暂无配置的任务</p>' :
                        tasks.map((t, i) => `
                            <div class="task-item">
                                <div class="task-status ${t.enabled ? 'active' : 'paused'}"></div>
                                <div class="task-info">
                                    <div class="task-name">${t.name || '未命名任务'}</div>
                                    <div class="task-schedule">${t.schedule || '未设置时间'} · ${t.target || '未指定目标'}</div>
                                </div>
                                <button class="btn btn-trigger" onclick="triggerTask(${i})">手动触发</button>
                                <button class="btn btn-toggle" onclick="toggleTask(${i})">${t.enabled ? '暂停' : '启用'}</button>
                            </div>
                        `).join('')}
                    </div>
                </div>
                <div class="status" id="status"></div>
            `;
        }

        async function triggerTask(index) {
            try {
                await fetch(`${API}/task-assistant/trigger/${index}`, { method: 'POST' });
                document.getElementById('status').textContent = '任务已触发';
            } catch (e) {
                document.getElementById('status').textContent = '触发失败: ' + e.message;
            }
        }

        async function toggleTask(index) {
            try {
                await fetch(`${API}/task-assistant/toggle/${index}`, { method: 'POST' });
                loadConfig();
            } catch (e) {
                document.getElementById('status').textContent = '切换失败: ' + e.message;
            }
        }

        loadConfig();
    </script>
</body>
</html>
