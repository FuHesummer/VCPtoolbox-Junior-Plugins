<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Agent 通讯配置</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: #0f172a; color: #f8fafc; padding: 16px; }
        h2 { margin-bottom: 16px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 4px; font-size: 0.85rem; color: #94a3b8; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 8px 12px; background: #1e293b; border: 1px solid #334155;
            border-radius: 6px; color: #f8fafc; font-size: 0.9rem;
        }
        .form-group textarea { min-height: 80px; font-family: monospace; resize: vertical; }
        .agent-list { margin-top: 20px; }
        .agent-card { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 14px; margin-bottom: 10px; }
        .agent-card h4 { margin-bottom: 8px; }
        .btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.85rem; }
        .btn-save { background: #0ea5e9; color: white; }
        .btn-add { background: #10b981; color: white; margin-bottom: 16px; }
        .btn-remove { background: #dc2626; color: white; font-size: 0.75rem; padding: 4px 8px; }
        .status { margin-top: 8px; font-size: 0.8rem; color: #4ade80; }
        .loading { text-align: center; padding: 40px; opacity: 0.5; }
        .error { color: #ef4444; text-align: center; padding: 20px; }
    </style>
</head>
<body>
    <h2>Agent 通讯配置</h2>
    <div id="content"><p class="loading">加载中...</p></div>
    <script>
        const API = '/admin_api';
        let config = {};

        async function loadConfig() {
            try {
                const res = await fetch(`${API}/agent-assistant/config`);
                config = await res.json();
                render();
            } catch (e) {
                document.getElementById('content').innerHTML = `<p class="error">加载失败: ${e.message}<br><small>请确认 AgentAssistant 插件已启用</small></p>`;
            }
        }

        function render() {
            const agents = config.agents || [];
            document.getElementById('content').innerHTML = `
                <div class="form-group">
                    <label>历史轮数上限</label>
                    <input type="number" id="maxHistory" value="${config.maxHistoryRounds || 7}" min="1" max="50">
                </div>
                <div class="form-group">
                    <label>上下文 TTL (小时)</label>
                    <input type="number" id="contextTtl" value="${config.contextTtlHours || 24}" min="1">
                </div>
                <div class="form-group">
                    <label>全局系统提示词</label>
                    <textarea id="globalPrompt">${config.globalSystemPrompt || ''}</textarea>
                </div>
                <button class="btn btn-add" onclick="addAgent()">+ 添加 Agent</button>
                <div class="agent-list">
                    ${agents.map((a, i) => `
                        <div class="agent-card">
                            <h4>${a.name || '未命名'} <button class="btn-remove" onclick="removeAgent(${i})">移除</button></h4>
                            <div class="form-group">
                                <label>名称</label>
                                <input value="${a.name || ''}" onchange="config.agents[${i}].name=this.value">
                            </div>
                            <div class="form-group">
                                <label>模型</label>
                                <input value="${a.model || ''}" onchange="config.agents[${i}].model=this.value">
                            </div>
                            <div class="form-group">
                                <label>角色说明</label>
                                <textarea onchange="config.agents[${i}].description=this.value">${a.description || ''}</textarea>
                            </div>
                        </div>
                    `).join('')}
                </div>
                <button class="btn btn-save" onclick="saveConfig()">保存配置</button>
                <div class="status" id="status"></div>
            `;
        }

        function addAgent() {
            if (!config.agents) config.agents = [];
            config.agents.push({ name: '', model: '', description: '' });
            render();
        }

        function removeAgent(i) {
            config.agents.splice(i, 1);
            render();
        }

        async function saveConfig() {
            config.maxHistoryRounds = parseInt(document.getElementById('maxHistory').value);
            config.contextTtlHours = parseInt(document.getElementById('contextTtl').value);
            config.globalSystemPrompt = document.getElementById('globalPrompt').value;
            try {
                await fetch(`${API}/agent-assistant/config`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(config)
                });
                document.getElementById('status').textContent = '保存成功';
            } catch (e) {
                document.getElementById('status').textContent = '保存失败: ' + e.message;
            }
        }

        loadConfig();
    </script>
</body>
</html>
