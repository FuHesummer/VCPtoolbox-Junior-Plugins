<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>天气预报</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: #0f172a; color: #f8fafc; padding: 24px; }
        .weather-card { background: linear-gradient(135deg, #1e3a5f, #1e293b); border-radius: 16px; padding: 24px; max-width: 400px; }
        .current { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; }
        .temp { font-size: 3rem; font-weight: 200; }
        .temp .unit { font-size: 1.2rem; opacity: 0.6; }
        .desc { font-size: 1rem; opacity: 0.8; }
        .details { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-top: 16px; }
        .detail { text-align: center; padding: 8px; background: rgba(255,255,255,0.05); border-radius: 8px; }
        .detail .label { font-size: 0.7rem; opacity: 0.5; margin-bottom: 4px; }
        .detail .value { font-size: 0.95rem; }
        .forecast { margin-top: 20px; }
        .forecast-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.85rem; }
        .loading { text-align: center; padding: 40px; opacity: 0.5; }
        .error { color: #ef4444; padding: 20px; text-align: center; }
    </style>
</head>
<body>
    <div id="weather-content"><p class="loading">加载天气数据...</p></div>
    <script>
        async function loadWeather() {
            const container = document.getElementById('weather-content');
            try {
                const res = await fetch('/admin_api/weather');
                if (!res.ok) throw new Error('天气 API 不可用');
                const data = await res.json();

                container.innerHTML = `
                    <div class="weather-card">
                        <div class="current">
                            <div>
                                <div class="temp">${data.temp || '--'}<span class="unit">°C</span></div>
                                <div class="desc">${data.text || '未知'}</div>
                            </div>
                        </div>
                        <div class="details">
                            <div class="detail"><div class="label">湿度</div><div class="value">${data.humidity || '--'}%</div></div>
                            <div class="detail"><div class="label">风速</div><div class="value">${data.windSpeed || '--'} km/h</div></div>
                            <div class="detail"><div class="label">气压</div><div class="value">${data.pressure || '--'} hPa</div></div>
                        </div>
                        ${data.forecast ? `<div class="forecast">${data.forecast.map(f =>
                            `<div class="forecast-item"><span>${f.date}</span><span>${f.text}</span><span>${f.tempMin}~${f.tempMax}°C</span></div>`
                        ).join('')}</div>` : ''}
                    </div>
                `;
            } catch (e) {
                container.innerHTML = `<p class="error">${e.message}<br><small>请确认 WeatherReporter 插件已启用并配置了 API Key</small></p>`;
            }
        }
        loadWeather();
    </script>
</body>
</html>
