<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>每日热榜</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: #0f172a; color: #f8fafc; padding: 16px; }
        h2 { margin-bottom: 12px; font-size: 1.1rem; }
        .hot-list { max-height: 70vh; overflow-y: auto; }
        .hot-item { padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,0.06); display: flex; align-items: center; gap: 10px; }
        .hot-item:hover { background: rgba(255,255,255,0.04); }
        .hot-rank { color: #f59e0b; font-weight: 700; min-width: 24px; text-align: center; font-size: 0.85rem; }
        .hot-rank.top3 { color: #ef4444; }
        .hot-title { flex: 1; font-size: 0.9rem; line-height: 1.4; }
        .hot-heat { color: #94a3b8; font-size: 0.75rem; white-space: nowrap; }
        .loading { text-align: center; padding: 40px; opacity: 0.5; }
        .error { color: #ef4444; padding: 20px; text-align: center; }
        .tabs { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
        .tab { padding: 4px 10px; border-radius: 12px; font-size: 0.75rem; cursor: pointer; background: #1e293b; border: 1px solid #334155; color: #94a3b8; }
        .tab.active { background: #0ea5e9; color: white; border-color: #0ea5e9; }
    </style>
</head>
<body>
    <h2>每日热榜</h2>
    <div class="tabs" id="tabs"></div>
    <div class="hot-list" id="hot-list">
        <p class="loading">加载中...</p>
    </div>
    <script>
        const API = '/admin_api';
        let cachedData = null;

        async function loadHotNews() {
            try {
                const res = await fetch(`${API}/weather`);
                // DailyHot stores its cache file, try reading it via system API
                // Fallback: read the hot cache directly
                const cacheRes = await fetch(`${API}/plugins`);
                const plugins = await cacheRes.json();
                const dailyHot = plugins.find(p => p.manifest?.name === 'DailyHot');

                if (!dailyHot) {
                    document.getElementById('hot-list').innerHTML = '<p class="error">DailyHot 插件未加载</p>';
                    return;
                }

                // Try fetching the hot data from the plugin's cache endpoint
                const hotRes = await fetch(`${API}/dailyhot`);
                if (hotRes.ok) {
                    const raw = await hotRes.json();
                    // API returns { success, data: [{source, title, url}, ...] }
                    const items = raw.data || raw;
                    // Group by source
                    cachedData = {};
                    if (Array.isArray(items)) {
                        for (const item of items) {
                            const src = item.source || '未知';
                            if (!cachedData[src]) cachedData[src] = [];
                            cachedData[src].push(item);
                        }
                    } else if (typeof items === 'object') {
                        cachedData = items; // Already grouped
                    }
                    renderTabs();
                } else {
                    document.getElementById('hot-list').innerHTML = '<p class="error">热榜数据暂未就绪，请等待插件刷新缓存</p>';
                }
            } catch (e) {
                document.getElementById('hot-list').innerHTML = `<p class="error">加载失败: ${e.message}</p>`;
            }
        }

        function renderTabs() {
            if (!cachedData) return;
            const tabs = document.getElementById('tabs');
            const sources = Object.keys(cachedData);
            tabs.innerHTML = sources.map((s, i) =>
                `<span class="tab ${i === 0 ? 'active' : ''}" onclick="switchTab('${s}', this)">${s}</span>`
            ).join('');
            if (sources.length > 0) renderList(sources[0]);
        }

        function switchTab(source, el) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            renderList(source);
        }

        function renderList(source) {
            const list = document.getElementById('hot-list');
            const items = cachedData[source] || [];
            if (items.length === 0) {
                list.innerHTML = '<p class="loading">暂无数据</p>';
                return;
            }
            list.innerHTML = items.map((item, i) => `
                <div class="hot-item">
                    <span class="hot-rank ${i < 3 ? 'top3' : ''}">${i + 1}</span>
                    <span class="hot-title">${item.title || item}</span>
                    ${item.hot ? `<span class="hot-heat">${item.hot}</span>` : ''}
                </div>
            `).join('');
        }

        loadHotNews();
    </script>
</body>
</html>
