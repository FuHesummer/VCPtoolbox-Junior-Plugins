<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>梦境审批</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: #0f172a; color: #f8fafc; padding: 16px; }
        h2 { margin-bottom: 16px; }
        .dream-list { display: flex; flex-direction: column; gap: 10px; }
        .dream-card { background: #1e293b; border: 1px solid #334155; border-radius: 8px; overflow: hidden; }
        .dream-card.pending { border-left: 3px solid #f59e0b; }
        .dream-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; cursor: pointer; }
        .dream-header:hover { background: rgba(255,255,255,0.03); }
        .dream-title { font-weight: 600; font-size: 0.9rem; }
        .dream-meta { font-size: 0.75rem; color: #94a3b8; }
        .dream-body { padding: 0 16px 16px; display: none; }
        .dream-body.open { display: block; }
        .dream-content { background: #0f172a; padding: 12px; border-radius: 6px; font-size: 0.85rem; line-height: 1.5; max-height: 300px; overflow-y: auto; white-space: pre-wrap; }
        .dream-actions { margin-top: 10px; display: flex; gap: 8px; }
        .btn { padding: 6px 14px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.8rem; }
        .btn-approve { background: #10b981; color: white; }
        .btn-reject { background: #dc2626; color: white; }
        .badge { font-size: 0.7rem; padding: 2px 8px; border-radius: 10px; }
        .badge.pending { background: #92400e; color: #fbbf24; }
        .badge.approved { background: #166534; color: #4ade80; }
        .loading { text-align: center; padding: 40px; opacity: 0.5; }
        .error { color: #ef4444; text-align: center; padding: 20px; }
        .empty { text-align: center; padding: 60px 20px; opacity: 0.5; }
    </style>
</head>
<body>
    <h2>梦境审批</h2>
    <div id="content"><p class="loading">加载梦境日志...</p></div>
    <script>
        const API = '/admin_api';

        async function loadDreams() {
            const content = document.getElementById('content');
            try {
                const res = await fetch(`${API}/dream-logs`);
                if (!res.ok) throw new Error('梦境接口不可用');
                const logs = await res.json();

                if (!logs || logs.length === 0) {
                    content.innerHTML = '<p class="empty">暂无梦境记录</p>';
                    return;
                }

                content.innerHTML = '<div class="dream-list">' + logs.map(log => `
                    <div class="dream-card ${log.hasPending ? 'pending' : ''}">
                        <div class="dream-header" onclick="this.nextElementSibling.classList.toggle('open')">
                            <span class="dream-title">${log.filename || '未知'}</span>
                            <span class="dream-meta">${log.date || ''} · ${log.operationCount || 0} 项操作</span>
                        </div>
                        <div class="dream-body">
                            <div class="dream-content">${log.preview || '无内容预览'}</div>
                            ${log.hasPending ? `<div class="dream-actions">
                                <button class="btn btn-approve" onclick="approveDream('${log.filename}')">批准</button>
                                <button class="btn btn-reject" onclick="rejectDream('${log.filename}')">驳回</button>
                            </div>` : ''}
                        </div>
                    </div>
                `).join('') + '</div>';
            } catch (e) {
                content.innerHTML = `<p class="error">${e.message}<br><small>请确认 AgentDream 插件已启用</small></p>`;
            }
        }

        async function approveDream(filename) {
            await fetch(`${API}/dream-logs/${filename}/operations/all`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'approve' })
            });
            loadDreams();
        }

        async function rejectDream(filename) {
            await fetch(`${API}/dream-logs/${filename}/operations/all`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'reject' })
            });
            loadDreams();
        }

        loadDreams();
    </script>
</body>
</html>
